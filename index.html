<!DOCTYPE html>
<html>
<head>
  <title>WAVEN Timer</title>
</head>
<body>

<h1>🎮 WAVEN TIMER</h1>

<input id="name" placeholder="Nom">
<input id="password" placeholder="Mot de passe">
<button onclick="check()">Voir mon temps</button>

<p id="time"></p>

<script>
const API = "https://TON-API.railway.app"

async function check() {
  const name = document.getElementById("name").value
  const password = document.getElementById("password").value

  const res = await fetch(`${API}/get-session?name=${name}&password=${password}`, {
    method: "POST"
  })

  const data = await res.json()

  document.getElementById("time").innerText =
    "Temps restant: " + Math.floor(data.remaining_seconds / 60) + " min"
}
</script>

</body>
</html>
